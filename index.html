<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARDUST CHAT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1 id="app-title">STARDUST CHAT</h1>
    </header>

    <main class="app-content">
        
        <section id="screen-chat" class="screen active">
            <h2>Chats</h2>
            <div class="chat-list">
                <div class="chat-item">
                    <div class="avatar"></div>
                    <div class="chat-info">
                        <h3>Zhang Wei</h3>
                        <p>Hey! Are you there?</p>
                    </div>
                    <span class="badge">3</span>
                </div>
            </div>
        </section>

        <section id="screen-contact" class="screen">
            <h2>Contacts</h2>
            
            <div class="add-friend-box">
                <input type="text" id="friend-id-input" placeholder="Enter Unique User ID...">
                <button id="add-friend-btn">Add Friend</button>
            </div>

            <div class="contact-list">
                <div class="contact-item">
                    <div class="avatar"></div>
                    <h3>Li Na (ID: star_992)</h3>
                </div>
            </div>
        </section>

        <section id="screen-moment" class="screen">
            <h2>Moments</h2>
            <div class="create-post">
                <textarea placeholder="Share your moment with contacts..."></textarea>
                <button>Post</button>
            </div>
            <div class="moments-feed">
                <div class="moment-card">
                    <h4>Li Na</h4>
                    <p>Beautiful day in Shanghai! 🌸</p>
                </div>
            </div>
        </section>

        <section id="screen-profile" class="screen">
            <h2>My Profile</h2>
            <div class="profile-card">
                <div class="avatar large"></div>
                <h3 id="user-display-name">Your Name</h3>
                <p>Unique ID: <strong id="user-unique-id">stardust_4201</strong></p>
                
                <div class="login-system">
                    <h4>Connect Account / Login</h4>
                    <button class="login-btn google-btn">Sign in with Google</button>
                    <button class="login-btn wechat-btn">Sign in with WeChat</button>
                </div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchScreen('screen-chat', this)">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
            <span>Chat</span>
        </button>

        <button class="nav-btn" onclick="switchScreen('screen-contact', this)">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Contact</span>
        </button>

        <button class="nav-btn" onclick="switchScreen('screen-moment', this)">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span>Moment</span>
        </button>

        <button class="nav-btn" onclick="switchScreen('screen-profile', this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.33-8 4v2h16v-2c0-2.67-5.33-4-8-4z"/></svg>
            <span>Profile</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
