<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Chat - Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="logo-area">
                <h2>STARDUST CHAT</h2>
                <p>Connect across the global matrix instantly</p>
            </div>
            <div class="login-box">
                <h3>Create Your Identity</h3>
                <div class="input-group">
                    <label>Unique User ID (No Spaces)</label>
                    <input type="text" id="edit-username" placeholder="e.g., star_992" value="star_992">
                </div>
                <div class="input-group">
                    <label>Display Name</label>
                    <input type="text" id="edit-display-name" placeholder="e.g., Li Na" value="Li Na">
                </div>
                <div class="input-group">
                    <label>Region / Country</label>
                    <select id="edit-country">
                        <option value="India">India</option>
                        <option value="China">China</option>
                        <option value="USA">USA</option>
                        <option value="Global">Global</option>
                    </select>
                </div>
                
                <div class="oauth-buttons">
                    <button class="btn btn-google" onclick="mockLogin('Google')">Sign In with Google</button>
                    <button class="btn btn-wechat" onclick="mockLogin('WeChat')">Sign In with WeChat</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-hidden">
        <header class="app-header">
            <h1 class="brand-title" id="main-header-title">STARDUST CHAT</h1>
            <div class="header-actions">
                <button id="back-chat-btn" class="header-icon-btn hidden" onclick="closeChatBox()">Back</button>
                <button id="add-moment-btn" class="header-icon-btn hidden" onclick="openScreen('screen-create-moment')">+</button>
                <button id="setting-profile-btn" class="header-icon-btn hidden" onclick="logout()">Logout</button>
            </div>
        </header>

        <main class="app-content">
            
            <section id="screen-chat" class="screen">
                <h2 class="section-title">Chats</h2>
                <div id="chats-list-container" class="chats-list">
                    <p style="text-align:center; color:#888; margin-top:20px;">No active chats. Add friends to start talking.</p>
                </div>
            </section>

            <section id="screen-chat-window" class="screen">
                <div class="chat-messages-display" id="chat-messages-box">
                    </div>
                <div class="chat-input-footer-row">
                    <input type="text" id="chat-type-input" placeholder="Type a professional message...">
                    <button class="btn-send-message" onclick="dispatchMessage()">Send</button>
                </div>
            </section>

            <section id="screen-contact" class="screen">
                <h2 class="section-title">Contacts</h2>
                <div class="search-bar-row">
                    <input type="text" id="search-friend-id" placeholder="Enter Unique User ID...">
                    <button class="btn-action" onclick="searchAndAddFriend()">Add Friend</button>
                </div>
                <div id="contacts-list-container" class="contacts-list">
                    </div>
            </section>

            <section id="screen-moment" class="screen">
                <h2 class="section-title">Moments</h2>
                <div class="moments-timeline">
                    <div class="moment-premium-card">
                        <div class="moment-author">
                            <div class="avatar-circle small"></div>
                            <div>
                                <h5>Li Na</h5>
                                <span class="post-time">2 Hours ago</span>
                            </div>
                        </div>
                        <p class="post-text">Beautiful day in Shanghai!</p>
                    </div>
                </div>
            </section>

            <section id="screen-create-moment" class="screen">
                <h2 class="section-title">Share Moment</h2>
                <div class="compose-area">
                    <textarea id="post-caption" placeholder="Share your moment with contacts..." rows="4"></textarea>
                    <div id="media-preview-container"></div>
                    <div class="compose-actions">
                        <button class="btn-post" onclick="publishPost()">Post</button>
                        <button class="btn-cancel" onclick="backToMoments()">Cancel</button>
                    </div>
                </div>
            </section>

            <section id="screen-profile" class="screen">
                <h2 class="section-title">My Profile</h2>
                <div class="profile-dashboard-card">
                    <div class="avatar-circle large"></div>
                    <h3 id="profile-lbl-name">Your Name</h3>
                    <p>Unique ID: <strong id="profile-lbl-id">stardust_4201</strong></p>
                    <hr>
                    <button class="btn btn-danger" onclick="logout()">Disconnect / Logout</button>
                </div>
            </section>

        </main>

        <nav id="app-global-nav" class="app-bottom-nav">
            <button class="nav-btn active-btn" onclick="switchTab('screen-chat', this)">
                <span class="nav-text">Chat</span>
            </button>
            <button class="nav-btn" onclick="switchTab('screen-contact', this)">
                <span class="nav-text">Contact</span>
            </button>
            <button class="nav-btn" onclick="switchTab('screen-moment', this)">
                <span class="nav-text">Moment</span>
                <span id="badge-nav-moment" class="badge-dot hidden"></span>
            </button>
            <button class="nav-btn" onclick="switchTab('screen-profile', this)">
                <span class="nav-text">Profile</span>
                <span id="badge-nav-chat" class="badge-dot hidden">0</span>
            </button>
        </nav>
    </div>

    <div id="fullscreen-media-overlay" class="hidden" onclick="closeMediaFullscreen()">
        <div id="overlay-content-holder"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
