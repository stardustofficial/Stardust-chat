<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardust Super App</title>
    <link rel="stylesheet" href="./style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="login-screen" class="screen-wrapper">
        <div class="login-card">
            <div class="brand-identity">
                <div class="app-icon-logo">🔥</div>
                <h2>STARDUST</h2>
                <p>Enter the ecosystem via secure Google Protocol</p>
            </div>
            
            <div class="auth-action-area">
                <button type="button" class="oauth-btn google-auth" id="btn-google-login">
                    <img src="https://www.google.com/favicon.ico" alt="G">
                    <span>Sign in with Google</span>
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <header class="app-header">
            <h1 id="main-header-title">Stardust</h1>
            <div class="header-actions">
                <button id="add-moment-btn" class="icon-action-btn hidden" onclick="switchTab('screen-create-moment')">➕ New Post</button>
            </div>
        </header>

        <input type="file" id="hidden-pfp-input" accept="image/*" class="hidden">
        <input type="file" id="hidden-moment-media" accept="image/*" class="hidden">

        <main class="app-viewport-content">
            
            <section id="screen-chat" class="app-tab-panel">
                <div id="chats-list-container" class="scrollable-list-grid"></div>
            </section>

            <section id="screen-chat-window" class="app-tab-panel" style="display: none;">
                <div class="conversation-vessel" id="chat-messages-box"></div>
                <div class="interactive-input-row">
                    <input type="text" id="chat-type-input" placeholder="Type secure message...">
                    <button class="send-dispatch-btn" id="btn-send-msg">🚀</button>
                </div>
            </section>

            <section id="screen-moment" class="app-tab-panel" style="display: none;">
                <div class="moments-premium-scroller" id="moments-feed-wall"></div>
            </section>

            <section id="screen-create-moment" class="app-tab-panel" style="display: none;">
                <div class="composer-vessel">
                    <textarea id="post-caption" placeholder="Share something with the world..."></textarea>
                    <div class="media-attach-trigger" id="btn-trigger-moment-file">📂 Attach Image</div>
                    <div class="composer-button-group">
                        <button class="save-profile-btn" id="btn-publish-moment">Publish Moment</button>
                    </div>
                </div>
            </section>

            <section id="screen-profile" class="app-tab-panel" style="display: none;">
                <div class="user-identity-card-block">
                    <div class="identity-card-header">
                        <div id="profile-pfp-display" class="identity-avatar-placeholder"></div>
                        <div class="identity-text-details">
                            <h3 id="profile-lbl-name">Loading...</h3>
                            <p id="profile-lbl-email">---</p>
                        </div>
                    </div>
                    <button class="save-profile-btn" style="background:#ef4444;" id="btn-logout">Logout / Disconnect</button>
                </div>
            </section>

        </main>

        <nav class="fixed-dock-navigation">
            <button class="dock-nav-item active-dock-tab" onclick="switchTab('screen-chat')">Chats</button>
            <button class="dock-nav-item" onclick="switchTab('screen-moment')">Moments</button>
            <button class="dock-nav-item" onclick="switchTab('screen-profile')">Profile</button>
        </nav>
    </div>

    <script src="./script.js"></script>
</body>
</html>
